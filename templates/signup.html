<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - SplitPilot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="center-screen">
    <div class="login-shell">
      <div class="login-visual">
        <div class="auth-brand-chip">SplitPilot</div>
        <h2>Create Your Account</h2>
        <p>Set up your workspace to track expenses, payments, and monthly insights in one dashboard.</p>
      </div>

      <div class="auth-card login-card-enhanced">
        <p class="auth-kicker">Get Started</p>
        <h2 class="auth-title">Sign Up</h2>
        <p class="auth-subtitle">Start tracking your expenses</p>

        <form method="POST" action="/signup" class="stack">
          <div class="field-block">
            <label>Name</label>
            <input name="name" placeholder="Your name" required>
          </div>
          <div class="field-block">
            <label>Email</label>
            <input name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="field-block">
            <label>Password</label>
            <input name="password" type="password" placeholder="Create password" required>
          </div>
          <button type="submit">Create Account</button>
        </form>

        <p class="muted" style="margin-top:14px;">Already have an account? <a href="/login">Login</a></p>
      </div>
    </div>
  </div>
</body>
</html>
