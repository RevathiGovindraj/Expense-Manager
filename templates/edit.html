<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Edit Expense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="center-screen">
    <div class="auth-card">
      <h2 class="auth-title">Edit Expense</h2>
      <p class="auth-subtitle">Update this expense record</p>

      <form method="POST" class="stack">
        <input type="text" name="name" value="{{ item[0] }}" required>
        <input type="text" name="category" value="{{ item[1] }}" required>
        <input type="number" name="amount" value="{{ item[2] }}" required>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>
</body>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const csrfMeta = document.querySelector('meta[name="csrf-token"]');
    const csrfToken = csrfMeta ? csrfMeta.getAttribute("content") : "";
    if (!csrfToken) return;
    document.querySelectorAll('form[method="POST"]').forEach(function(form) {
      if (form.querySelector('input[name="csrf_token"]')) return;
      const hidden = document.createElement("input");
      hidden.type = "hidden";
      hidden.name = "csrf_token";
      hidden.value = csrfToken;
      form.appendChild(hidden);
    });
  });
</script>
</html>
